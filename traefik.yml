entryPoints:
  web:
    address: ":80" # HTTP
    forwardedHeaders:
      trustedIPs:
        # Cloudflare IPv4 ranges - https://www.cloudflare.com/ips-v4/#
        - "173.245.48.0/20"
        - "103.21.244.0/22"
        - "103.22.200.0/22"
        - "103.31.4.0/22"
        - "141.101.64.0/18"
        - "108.162.192.0/18"
        - "190.93.240.0/20"
        - "188.114.96.0/20"
        - "197.234.240.0/22"
        - "198.41.128.0/17"
        - "162.158.0.0/15"
        - "104.16.0.0/13"
        - "104.24.0.0/14"
        - "172.64.0.0/13"
        - "131.0.72.0/22"

providers:
  docker:
    exposedByDefault: false
    network: "server-network"

api:
  dashboard: false
  insecure: false

log:
  level: "INFO"
  format: json
  filePath: "/var/log/traefik/traefik.log"

accessLog:
  format: json
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  filters:
    statusCodes:
      - "200-299"
      - "400-499"
      - "500-599"

global:
  checkNewVersion: false
  sendAnonymousUsage: false
