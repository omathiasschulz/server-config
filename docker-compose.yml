services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - traefik-logs:/var/log/traefik
    networks:
      - server-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  example-api:
    build:
      context: ./example-api
      dockerfile: Dockerfile
    container_name: example-api
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - server-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.example-api.rule=Host(`${API_SUBDOMAIN:-api.localhost}`)"
      - "traefik.http.routers.example-api.entrypoints=web"
      - "traefik.http.services.example-api.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  server-network:
    name: server-network
    driver: bridge

volumes:
  traefik-logs:
    name: traefik-logs
