services:
  traefik:
    image: traefik:v3.6.1
    container_name: traefik
    restart: unless-stopped
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-}
      - ACME_CA_SERVER=${ACME_CA_SERVER:-}
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - traefik-logs:/var/log/traefik
      - acme-certificates:/acme
    command:
      - "--configFile=/traefik.yml"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-}"
    networks:
      - server-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  example-api:
    build:
      context: ./example-api
      dockerfile: Dockerfile
    container_name: example-api
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - server-network
    labels:
      - "traefik.enable=true"
      # HTTP router (will redirect to HTTPS via entrypoint)
      - "traefik.http.routers.example-api-http.rule=Host(`${API_SUBDOMAIN:-api.localhost}`)"
      - "traefik.http.routers.example-api-http.entrypoints=web"
      # HTTPS router with Let's Encrypt
      - "traefik.http.routers.example-api.rule=Host(`${API_SUBDOMAIN:-api.localhost}`)"
      - "traefik.http.routers.example-api.entrypoints=websecure"
      - "traefik.http.routers.example-api.tls=true"
      - "traefik.http.routers.example-api.tls.certresolver=letsencrypt"
      # Service configuration
      - "traefik.http.routers.example-api.middlewares=rate-limit,sec-headers"
      - "traefik.http.routers.example-api-http.middlewares=rate-limit,sec-headers"
      - "traefik.http.services.example-api.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  server-network:
    name: server-network
    driver: bridge

volumes:
  traefik-logs:
    name: traefik-logs
  acme-certificates:
    name: acme-certificates
